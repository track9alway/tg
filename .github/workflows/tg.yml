name: Search or Download

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'نوع عملیات'
        required: true
        default: 'search'
        type: choice
        options:
          - search
          - download
      search_query:
        description: 'عبارت جستجو (در حالت search)'
        required: false
        type: string
      video_url:
        description: 'آدرس ویدیو (در حالت download)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run script
        run: |
          python scraper.py --mode "${{ github.event.inputs.mode }}" \
            --query "${{ github.event.inputs.search_query }}" \
            --url "${{ github.event.inputs.video_url }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json downloads/ || true
          git diff --staged --quiet || git commit -m "به‌روزرسانی نتایج: ${{ github.event.inputs.mode }}"
          git push
